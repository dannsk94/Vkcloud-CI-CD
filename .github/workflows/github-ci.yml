name: Packer + Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TF_ROOT: terraform
  TF_VAR_auth_url: ${{ secrets.OS_AUTH_URL }}
  TF_VAR_user_domain_name: users
  TF_VAR_project_id: ${{ secrets.OS_PROJECT_ID }}
  TF_VAR_username: ${{ secrets.OS_USERNAME }}
  TF_VAR_password: ${{ secrets.OS_PASSWORD }}
  TF_VAR_region_name: ${{ secrets.OS_REGION_NAME }}

jobs:
  #packer_build:
    #name: Packer Build
    #runs-on: ubuntu-latest
    #env:
      #PACKER_GITHUB_API_TOKEN: ${{ secrets.PACKER_GITHUB_API_TOKEN }}
    #steps:
      #- uses: actions/checkout@v4
      #- uses: hashicorp/setup-packer@v3
      #- name: Create clouds.yaml
        #run: |
          #cat > packer/clouds.yaml << 'EOF'
          #${{ secrets.CLOUDS_YAML }}
          #EOF
      #- name: Packer Init
        #run: |
          #cd packer
          #packer init lab-packer-config.pkr.hcl
      #- name: Packer Build
        #run: |
          #cd packer
          #OS_CLOUD=vkcs packer build lab-packer-config.pkr.hcl
      #- name: Get Image ID
        #run: bash packer/image-name.sh

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    #needs: packer_build
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_INTERFACE: ${{ secrets.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ secrets.OS_IDENTITY_API_VERSION }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      OS_CLOUD: vkcs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          cat > ~/.config/openstack/clouds.yaml << EOF
          clouds:
            vkcs:
              auth:
                auth_url: $OS_AUTH_URL
                username: $OS_USERNAME
                password: $OS_PASSWORD
                project_id: $OS_PROJECT_ID
                user_domain_name: users
                region_name: $OS_REGION_NAME
              interface: public
              identity_api_version: 3
          EOF
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform validate
        working-directory: ${{ env.TF_ROOT }}

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_INTERFACE: ${{ secrets.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ secrets.OS_IDENTITY_API_VERSION }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      OS_CLOUD: vkcs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml for Terraform
        run: |
          mkdir -p ~/.config/openstack
          cat > ~/.config/openstack/clouds.yaml << EOF
          clouds:
            vkcs:
              auth:
                auth_url: $OS_AUTH_URL
                username: $OS_USERNAME
                password: $OS_PASSWORD
                project_id: $OS_PROJECT_ID
                user_domain_name: users
                region_name: $OS_REGION_NAME
              interface: public
              identity_api_version: 3
          EOF
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform plan
        working-directory: ${{ env.TF_ROOT }}

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OS_AUTH_URL: ${{ secrets.OS_AUTH_URL }}
      OS_PROJECT_ID: ${{ secrets.OS_PROJECT_ID }}
      OS_REGION_NAME: ${{ secrets.OS_REGION_NAME }}
      OS_USERNAME: ${{ secrets.OS_USERNAME }}
      OS_USER_DOMAIN_NAME: ${{ secrets.OS_USER_DOMAIN_NAME }}
      OS_PASSWORD: ${{ secrets.OS_PASSWORD }}
      OS_INTERFACE: ${{ secrets.OS_INTERFACE }}
      OS_IDENTITY_API_VERSION: ${{ secrets.OS_IDENTITY_API_VERSION }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      OS_CLOUD: vkcs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          cat > ~/.config/openstack/clouds.yaml << EOF
          clouds:
            vkcs:
              auth:
                auth_url: $OS_AUTH_URL
                username: $OS_USERNAME
                password: $OS_PASSWORD
                project_id: $OS_PROJECT_ID
                user_domain_name: users
                region_name: $OS_REGION_NAME
              interface: public
              identity_api_version: 3
          EOF
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform apply -auto-approve
        working-directory: ${{ env.TF_ROOT }}