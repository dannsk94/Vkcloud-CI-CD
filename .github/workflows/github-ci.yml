name: Packer + Terraform CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  TF_ROOT: terraform
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  packer_build:
    name: Packer Build
    if: github.event_name == 'push' && contains(github.event.head_commit.modified, 'packer/')
    runs-on: ubuntu-latest
    env:
      PACKER_GITHUB_API_TOKEN: ${{ secrets.PACKER_GITHUB_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@v3
      - name: Create clouds.yaml
        run: |
          cat > packer/clouds.yaml << 'EOF'
          ${{ secrets.CLOUDS_YAML }}
          EOF
      - name: Packer Init
        run: |
          cd packer
          packer init lab-packer-config.pkr.hcl
      - name: Packer Build
        run: |
          cd packer
          OS_CLOUD=vkcs packer build lab-packer-config.pkr.hcl
      - name: Get Image ID
        run: bash packer/image-name.sh
      - name: Upload image ID
        uses: actions/upload-artifact@v4
        with:
          name: image-id
          path: terraform/image.auto.tfvars

  validate:
    name: Validate
    if: |
      github.event_name != 'workflow_dispatch' &&
      !cancelled()
    needs: packer_build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-id
          path: terraform/
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform validate
        working-directory: ${{ env.TF_ROOT }}

  plan:
    name: Plan
    if: github.event_name != 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    env:
      OS_CLOUD: vkcs
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-id
          path: terraform/
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$CLOUDS_YAML" > ~/.config/openstack/clouds.yaml
        env:
          CLOUDS_YAML: ${{ secrets.CLOUDS_YAML }}
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform plan
        working-directory: ${{ env.TF_ROOT }}

  apply:
    name: Apply
    if: github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: plan
    environment: production
    runs-on: ubuntu-latest
    env:
      OS_CLOUD: vkcs
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-id
          path: terraform/
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$CLOUDS_YAML" > ~/.config/openstack/clouds.yaml
        env:
          CLOUDS_YAML: ${{ secrets.CLOUDS_YAML }}
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform apply -auto-approve
        working-directory: ${{ env.TF_ROOT }}

  destroy:
    name: Destroy
    if: github.event_name == 'workflow_dispatch'
    environment: production
    runs-on: ubuntu-latest
    env:
      OS_CLOUD: vkcs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Create clouds.yaml
        run: |
          mkdir -p ~/.config/openstack
          echo "$CLOUDS_YAML" > ~/.config/openstack/clouds.yaml
        env:
          CLOUDS_YAML: ${{ secrets.CLOUDS_YAML }}
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform destroy -auto-approve
        working-directory: ${{ env.TF_ROOT }}