  #     - name: Create clouds.yaml
  #       run: |
  #         cat > packer/clouds.yaml << 'EOF'
  #         ${{ secrets.CLOUDS_YAML }}
  #         EOF
  #     - name: Packer Init
  #       run: |
  #         cd packer
  #         packer init lab-packer-config.pkr.hcl
  #     - name: Packer Build
  #       run: |
  #         cd packer
  #         OS_CLOUD=vkcs packer build lab-packer-config.pkr.hcl
  #     - name: Get Image ID
  #       run: bash packer/image-name.sh

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform validate
        working-directory: ${{ env.TF_ROOT }}

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    env:
      TF_VAR_auth_url: ${{ secrets.OS_AUTH_URL }}
      TF_VAR_username: ${{ secrets.OS_USERNAME }}
      TF_VAR_password: ${{ secrets.OS_PASSWORD }}
      TF_VAR_project_id: ${{ secrets.OS_PROJECT_ID }}
      TF_VAR_user_domain_name: users
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform plan
        working-directory: ${{ env.TF_ROOT }}

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main'
    environment: production
    env:
      TF_VAR_auth_url: ${{ secrets.OS_AUTH_URL }}
      TF_VAR_username: ${{ secrets.OS_USERNAME }}
      TF_VAR_password: ${{ secrets.OS_PASSWORD }}
      TF_VAR_project_id: ${{ secrets.OS_PROJECT_ID }}
      TF_VAR_user_domain_name: users
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
        working-directory: ${{ env.TF_ROOT }}
      - run: terraform apply -auto-approve
        working-directory: ${{ env.TF_ROOT }}